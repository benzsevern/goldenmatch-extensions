name: Bug Report
description: Report a bug in GoldenMatch Extensions
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of GoldenMatch Extensions are you using?
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Install extension...
        2. Run query...
        3. See error...
    validations:
      required: true

  - type: dropdown
    id: extension-type
    attributes:
      label: Extension Type
      description: Which GoldenMatch Extensions component is affected?
      options:
        - Postgres / pgrx
        - DuckDB
        - Python bridge
    validations:
      required: true

  - type: input
    id: database-version
    attributes:
      label: Database Version
      description: Which database version are you running?
      placeholder: e.g. PostgreSQL 16.2, DuckDB 1.1.0
    validations:
      required: false

  - type: textarea
    id: error-output
    attributes:
      label: Error Output
      description: Paste any relevant error output or logs.
      render: shell
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: Which operating system are you using?
      options:
        - Linux
        - macOS
        - Windows
        - Docker
        - Other
    validations:
      required: true
