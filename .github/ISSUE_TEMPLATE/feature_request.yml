name: Feature Request
description: Suggest a new feature or improvement for GoldenMatch Extensions
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Describe the limitation or pain point.
      placeholder: I'm frustrated that...
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see implemented.
      placeholder: It would be great if...
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which area of GoldenMatch Extensions does this relate to?
      options:
        - Postgres Extension
        - DuckDB UDFs
        - Python Bridge
        - New Scorers
        - Documentation
        - Other
    validations:
      required: true
