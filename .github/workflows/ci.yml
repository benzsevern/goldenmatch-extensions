name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy (bridge only)
        run: cargo clippy -p goldenmatch-bridge -- -D warnings

  bridge-tests:
    name: Bridge Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install goldenmatch
        run: pip install goldenmatch>=1.1.0
      - name: Build bridge crate
        run: cargo build -p goldenmatch-bridge
      - name: Test bridge crate
        run: cargo test -p goldenmatch-bridge

  postgres-build:
    name: Postgres Extension (PG 16)
    runs-on: ubuntu-latest
    env:
      PG_VERSION: "16"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-16 postgresql-server-dev-16 libclang-dev
          # Make PG directories writable for pgrx install/test
          sudo chmod a+rwx /usr/share/postgresql/16/extension /usr/lib/postgresql/16/lib

      - name: Install goldenmatch
        run: pip install goldenmatch>=1.1.0

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version "0.12.9" --locked

      - name: Initialize pgrx
        run: cargo pgrx init --pg16=/usr/lib/postgresql/16/bin/pg_config

      - name: Build extension
        run: cargo build -p goldenmatch_pg --features pg16 --no-default-features

      - name: Generate and install extension schema
        working-directory: postgres
        run: |
          cargo pgrx schema pg16 2>&1 || true
          # pgrx schema generates SQL to stdout or to sql/ directory
          # Find and install it
          find . ../target -name "goldenmatch_pg--*.sql" -type f 2>/dev/null | head -5
          SQL_FILE=$(find . ../target -name "goldenmatch_pg--*.sql" -type f 2>/dev/null | head -1)
          if [ -n "$SQL_FILE" ]; then
            cp "$SQL_FILE" /usr/share/postgresql/16/extension/
            echo "Installed SQL: $SQL_FILE"
          else
            echo "WARNING: No SQL file generated, creating minimal one"
            cargo pgrx schema pg16 > /usr/share/postgresql/16/extension/goldenmatch_pg--0.1.0.sql
          fi

      - name: Run pgrx tests
        working-directory: postgres
        run: cargo pgrx test pg16
