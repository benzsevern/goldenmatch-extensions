name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check formatting (bridge)
        run: cargo fmt --all -- --check
      - name: Check formatting (postgres)
        working-directory: postgres
        run: cargo fmt --all -- --check
      - name: Clippy (bridge)
        run: cargo clippy -p goldenmatch-bridge -- -D warnings

  bridge-tests:
    name: Bridge Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install goldenmatch
        run: pip install goldenmatch>=1.1.0
      - name: Build bridge crate
        run: cargo build -p goldenmatch-bridge
      - name: Test bridge crate
        run: cargo test -p goldenmatch-bridge

  postgres-build:
    name: Postgres Extension (PG 16)
    runs-on: ubuntu-latest
    env:
      PG_VERSION: "16"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-16 postgresql-server-dev-16 libclang-dev
          sudo chmod a+rwx /usr/share/postgresql/16/extension /usr/lib/postgresql/16/lib

      - name: Install goldenmatch
        run: pip install goldenmatch>=1.1.0

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version "0.12.9" --locked

      - name: Initialize pgrx
        run: cargo pgrx init --pg16=/usr/lib/postgresql/16/bin/pg_config

      - name: Install extension and run tests
        working-directory: postgres
        run: |
          # Install the extension
          cargo pgrx install --pg-config=/usr/lib/postgresql/16/bin/pg_config --release
          # pgrx 0.12.9 bug: SQL file not written. Search the entire build tree.
          echo "=== Searching for SQL files ==="
          find ../target -name "*.sql" -type f 2>/dev/null | head -10
          find . -name "*.sql" -type f 2>/dev/null | head -10
          echo "=== Extension dir ==="
          ls -la /usr/share/postgresql/16/extension/goldenmatch* 2>/dev/null || echo "none"
          # If SQL was found in build tree, copy it
          SQL=$(find ../target -name "goldenmatch_pg--*.sql" -type f 2>/dev/null | head -1)
          if [ -n "$SQL" ]; then
            cp "$SQL" /usr/share/postgresql/16/extension/
            echo "Copied SQL from build tree: $SQL"
          fi
          # Run tests
          cargo pgrx test pg16
