name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check formatting (bridge)
        run: cargo fmt --all -- --check
      - name: Check formatting (postgres)
        working-directory: postgres
        run: cargo fmt --all -- --check
      - name: Clippy (bridge)
        run: cargo clippy -p goldenmatch-bridge -- -D warnings

  bridge-tests:
    name: Bridge Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install goldenmatch
        run: pip install goldenmatch>=1.1.0
      - name: Build bridge crate
        run: cargo build -p goldenmatch-bridge
      - name: Test bridge crate
        run: cargo test -p goldenmatch-bridge

  postgres-build:
    name: Postgres Extension (PG 16)
    runs-on: ubuntu-latest
    env:
      PG_VERSION: "16"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-16 postgresql-server-dev-16 libclang-dev
          sudo chmod a+rwx /usr/share/postgresql/16/extension /usr/lib/postgresql/16/lib

      - name: Install goldenmatch
        run: pip install goldenmatch>=1.1.0

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version "0.12.9" --locked

      - name: Initialize pgrx
        run: cargo pgrx init --pg16=/usr/lib/postgresql/16/bin/pg_config

      - name: Install extension
        working-directory: postgres
        run: |
          cargo pgrx install --pg-config=/usr/lib/postgresql/16/bin/pg_config --release
          cp sql/goldenmatch_pg--0.1.0.sql /usr/share/postgresql/16/extension/
          ls -la /usr/share/postgresql/16/extension/goldenmatch_pg*
          ls -la /usr/lib/postgresql/16/lib/goldenmatch_pg*

      - name: Test extension via psql
        run: |
          sudo -u postgres pg_ctlcluster 16 main start || true
          # List available symbols in the .so for debugging
          echo "=== Exported symbols containing goldenmatch ==="
          nm -D /usr/lib/postgresql/16/lib/goldenmatch_pg.so 2>/dev/null | grep -i goldenmatch | head -20 || echo "nm not available"
          # Create extension
          sudo -u postgres psql -v ON_ERROR_STOP=1 -c "CREATE EXTENSION goldenmatch_pg;"
          echo "=== Functions created ==="
          sudo -u postgres psql -c "SELECT proname, pronargs FROM pg_proc WHERE proname LIKE 'goldenmatch%';"
          echo "=== Test goldenmatch_score ==="
          sudo -u postgres psql -v ON_ERROR_STOP=1 -c "SELECT goldenmatch.goldenmatch_score('John Smith'::TEXT, 'Jon Smyth'::TEXT, 'jaro_winkler'::TEXT);"
          echo "=== Test goldenmatch_score exact ==="
          sudo -u postgres psql -v ON_ERROR_STOP=1 -c "SELECT goldenmatch.goldenmatch_score('hello'::TEXT, 'hello'::TEXT, 'exact'::TEXT);"
          echo "=== Test SPI: dedupe a real table ==="
          sudo -u postgres psql -v ON_ERROR_STOP=1 <<'EOSQL'
            CREATE TABLE test_customers (name TEXT, email TEXT);
            INSERT INTO test_customers VALUES
              ('John Smith', 'john@x.com'),
              ('JOHN SMITH', 'john@x.com'),
              ('Jane Doe', 'jane@y.com'),
              ('Bob Jones', 'bob@z.com');
            SELECT goldenmatch.goldenmatch_dedupe_table('test_customers'::TEXT, '{"exact": ["email"]}'::TEXT);
          EOSQL
          echo "=== Test SPI: match two tables ==="
          sudo -u postgres psql -v ON_ERROR_STOP=1 <<'EOSQL'
            CREATE TABLE test_prospects (name TEXT, email TEXT);
            INSERT INTO test_prospects VALUES ('John', 'john@x.com'), ('Alice', 'alice@z.com');
            CREATE TABLE test_reference (name TEXT, email TEXT);
            INSERT INTO test_reference VALUES ('JOHN SMITH', 'john@x.com'), ('Bob', 'bob@z.com');
            SELECT goldenmatch.goldenmatch_match_tables('test_prospects'::TEXT, 'test_reference'::TEXT, '{"exact": ["email"]}'::TEXT);
          EOSQL
          echo "=== Test table-returning: dedupe_pairs ==="
          sudo -u postgres psql -v ON_ERROR_STOP=1 -c "SELECT * FROM goldenmatch.goldenmatch_dedupe_pairs('test_customers'::TEXT, '{\"exact\": [\"email\"]}'::TEXT);"
          echo "=== Test table-returning: dedupe_clusters ==="
          sudo -u postgres psql -v ON_ERROR_STOP=1 -c "SELECT * FROM goldenmatch.goldenmatch_dedupe_clusters('test_customers'::TEXT, '{\"exact\": [\"email\"]}'::TEXT);"
          echo "=== Test Pipeline: configure + run + inspect ==="
          sudo -u postgres psql -v ON_ERROR_STOP=1 <<'EOSQL'
            -- Configure a job
            SELECT goldenmatch.gm_configure('test_job'::TEXT, '{"exact": ["email"]}'::TEXT);
            -- Run it against the test_customers table (created above)
            SELECT goldenmatch.gm_run('test_job'::TEXT, 'test_customers'::TEXT);
            -- List jobs
            SELECT goldenmatch.gm_jobs();
            -- Get golden records
            SELECT goldenmatch.gm_golden('test_job'::TEXT);
            -- Query pairs and clusters
            SELECT * FROM goldenmatch.gm_pairs('test_job'::TEXT);
            SELECT * FROM goldenmatch.gm_clusters('test_job'::TEXT);
            -- Drop the job
            SELECT goldenmatch.gm_drop('test_job'::TEXT);
          EOSQL
          echo "=== All Postgres tests passed ==="

  duckdb-tests:
    name: DuckDB Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install goldenmatch>=1.1.0 pyarrow
          cd duckdb && pip install -e ".[dev]" || pip install -e .
          pip install pytest
      - name: Run tests
        working-directory: duckdb
        run: python -m pytest tests/ -v
