name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-pg-extension:
    name: Build PG ${{ matrix.pg }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        pg: [15, 16, 17]
        os: [ubuntu-latest]
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
      PG_VERSION: ${{ matrix.pg }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y "postgresql-${PG_VERSION}" "postgresql-server-dev-${PG_VERSION}" libclang-dev
          sudo chmod a+rwx "/usr/share/postgresql/${PG_VERSION}/extension" "/usr/lib/postgresql/${PG_VERSION}/lib"

      - name: Install goldenmatch
        run: pip install goldenmatch>=1.1.0

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version "0.12.9" --locked

      - name: Initialize pgrx
        run: cargo pgrx init "--pg${PG_VERSION}=/usr/lib/postgresql/${PG_VERSION}/bin/pg_config"

      - name: Build extension (release)
        working-directory: postgres
        run: cargo pgrx install "--pg-config=/usr/lib/postgresql/${PG_VERSION}/bin/pg_config" --release --features "pg${PG_VERSION}" --no-default-features

      - name: Package extension (tar.gz)
        run: |
          ARCH=$(uname -m)
          PKG_NAME="goldenmatch_pg-${RELEASE_TAG}-pg${PG_VERSION}-py312-linux-${ARCH}"
          mkdir -p "${PKG_NAME}"
          cp "/usr/lib/postgresql/${PG_VERSION}/lib/goldenmatch_pg.so" "${PKG_NAME}/"
          cp "/usr/share/postgresql/${PG_VERSION}/extension/goldenmatch_pg.control" "${PKG_NAME}/"
          cp postgres/sql/goldenmatch_pg--0.1.0.sql "${PKG_NAME}/"
          cp README.md "${PKG_NAME}/"
          tar czf "${PKG_NAME}.tar.gz" "${PKG_NAME}"
          echo "PKG_NAME=${PKG_NAME}" >> "$GITHUB_ENV"

      - name: Build .deb and .rpm packages
        env:
          NFPM_VERSION: "2.41.1"
        run: |
          # Install nfpm
          curl -sSLo /tmp/nfpm.tar.gz "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz"
          tar xzf /tmp/nfpm.tar.gz -C /tmp nfpm
          chmod +x /tmp/nfpm

          PKG_VER="${RELEASE_TAG#v}"
          ARCH=$(dpkg --print-architecture)

          cat > /tmp/nfpm.yaml <<EOF
          name: postgresql-${PG_VERSION}-goldenmatch
          arch: ${ARCH}
          version: ${PKG_VER}
          maintainer: Ben Severn <benzsevern@gmail.com>
          description: GoldenMatch entity resolution extension for PostgreSQL ${PG_VERSION}
          homepage: https://github.com/benzsevern/goldenmatch-extensions
          license: MIT
          depends:
            - postgresql-${PG_VERSION}
          contents:
            - src: ${PKG_NAME}/goldenmatch_pg.so
              dst: /usr/lib/postgresql/${PG_VERSION}/lib/goldenmatch_pg.so
            - src: ${PKG_NAME}/goldenmatch_pg.control
              dst: /usr/share/postgresql/${PG_VERSION}/extension/goldenmatch_pg.control
            - src: ${PKG_NAME}/goldenmatch_pg--0.1.0.sql
              dst: /usr/share/postgresql/${PG_VERSION}/extension/goldenmatch_pg--0.1.0.sql
          EOF

          /tmp/nfpm package --config /tmp/nfpm.yaml --packager deb
          /tmp/nfpm package --config /tmp/nfpm.yaml --packager rpm

          echo "DEB_FILE=$(ls *.deb)" >> "$GITHUB_ENV"
          echo "RPM_FILE=$(ls *.rpm)" >> "$GITHUB_ENV"

      - name: Upload release artifacts
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${RELEASE_TAG}" "${PKG_NAME}.tar.gz" --clobber
          gh release upload "${RELEASE_TAG}" "${DEB_FILE}" --clobber
          gh release upload "${RELEASE_TAG}" "${RPM_FILE}" --clobber

  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: build-pg-extension
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.event.release.tag_name || github.ref_name }}
            ghcr.io/${{ github.repository }}:latest

      - name: Log in to Docker Hub
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to Docker Hub
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            benzsevern/goldenmatch-pg:${{ github.event.release.tag_name || github.ref_name }}
            benzsevern/goldenmatch-pg:latest
